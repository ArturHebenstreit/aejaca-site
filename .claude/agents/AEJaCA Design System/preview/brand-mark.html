<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
  .wrap { padding: 22px 26px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .panel { aspect-ratio: 1/1; border-radius: 14px; display:flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; position: relative; }
  .panel .meta { position: absolute; bottom: 10px; left: 12px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
  .panel img { width: 60%; }

  .dark { background: #0a0a0a; }
  .dark img { filter: brightness(0) invert(1); opacity: 0.85; }
  .glow { background: #0a0a0a; }
  .glow img { filter: brightness(0) invert(1) drop-shadow(0 0 20px rgba(255,255,255,0.30)); }
  .amber-bg { background: linear-gradient(135deg, #451a03, #0a0a0a); }
  .amber-bg img { filter: brightness(0) invert(0.78) sepia(1) saturate(8) hue-rotate(0deg) drop-shadow(0 0 14px rgba(245,158,11,0.5)); }
  .light { background: #fafafa; }
  .light img { filter: brightness(0); opacity: 0.9; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel dark"><img src="../assets/brand-sign.webp" alt="AEJaCA"/><span class="meta">brand-sign · dark</span></div>
    <div class="panel glow"><img src="../assets/brand-sign.webp" alt="AEJaCA glow"/><span class="meta">drop-shadow glow</span></div>
    <div class="panel amber-bg"><img src="../assets/brand-sign.webp" alt="AEJaCA amber"/><span class="meta">amber tint · hero</span></div>
    <div class="panel light"><img src="../assets/brand-sign.webp" alt="AEJaCA light"/><span class="meta">on light · print</span></div>
  </div>
</body>
</html>
