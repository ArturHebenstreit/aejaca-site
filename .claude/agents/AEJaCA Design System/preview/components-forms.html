<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
  .wrap { padding: 22px 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  label { display:block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; font-weight: 500; }
  .input, .select { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-default); border-radius: 8px; color: #fff; font-size: 14px; font-family: var(--font-sans); transition: all 200ms; box-sizing: border-box; }
  .input:focus, .select:focus { outline: none; border-color: var(--amber-500); box-shadow: 0 0 0 3px rgba(245,158,11,0.18); }
  .textarea { min-height: 96px; resize: vertical; }
  .help { font-size: 12px; color: var(--fg-4); margin-top: 6px; }
  .placeholder { color: var(--fg-4); }

  .pill-radio { display:flex; gap: 8px; flex-wrap: wrap; }
  .pill-radio span { padding: 8px 14px; border-radius: 9999px; border: 1px solid var(--border-default); font-size: 13px; color: var(--fg-2); background: rgba(255,255,255,0.02); cursor: pointer; }
  .pill-radio span.active { background: rgba(245,158,11,0.10); border-color: var(--amber-500); color: var(--amber-300); }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <label>Name</label>
      <div class="input"><span style="color: #fff;">Marta Kowalska</span></div>
    </div>
    <div>
      <label>Email</label>
      <div class="input"><span class="placeholder">your@email.com</span></div>
    </div>
    <div>
      <label>I'm interested in</label>
      <div class="select" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Custom Jewelry (AEJaCA)</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--fg-4)"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
    <div>
      <label>Type</label>
      <div class="pill-radio">
        <span class="active">Ring</span>
        <span>Earrings</span>
        <span>Pendant</span>
        <span>Bracelet</span>
      </div>
    </div>
    <div style="grid-column: 1 / -1;">
      <label>Message</label>
      <div class="input textarea"><span class="placeholder">Tell us about your project or idea…</span></div>
      <div class="help">We typically reply within 24 hours · contact@aejaca.com</div>
    </div>
  </div>
</body>
</html>
