<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Type: Serif (Jewelry/Display)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
  .wrap { padding: 28px 32px; }
  .eyebrow { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--amber-500); font-weight: 500; margin-bottom: 8px; }
  .display { font-family: var(--font-serif); font-weight: 600; font-size: 56px; line-height: 1.05; letter-spacing: -0.02em; color: #fff; margin: 0; }
  .meta-row { display: flex; gap: 24px; margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
  .meta-row b { color: var(--fg-2); font-weight: 600; }
  .stack { margin-top: 22px; display: grid; gap: 6px; }
  .stack .line { font-family: var(--font-serif); color: #fff; line-height: 1.15; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Playfair Display · Serif</div>
    <h1 class="display">Wear what matters.</h1>
    <div class="meta-row">
      <span><b>Family</b> Playfair Display</span>
      <span><b>Weights</b> 400 · 500 · 600 · 700 · 400 italic</span>
      <span><b>Used by</b> Jewelry · home hero</span>
    </div>
    <div class="stack">
      <div class="line" style="font-size: 36px; font-weight: 600; letter-spacing: -0.01em;">Where art meets craftsmanship</div>
      <div class="line" style="font-size: 24px; font-weight: 600;">How your jewelry is made</div>
      <div class="line" style="font-size: 18px; font-style: italic; font-weight: 400; color: var(--amber-300);">A timeless companion.</div>
    </div>
  </div>
</body>
</html>
