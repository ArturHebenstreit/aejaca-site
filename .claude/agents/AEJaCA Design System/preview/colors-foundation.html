<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Colors: Foundation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); font-family: var(--font-sans); }
  .wrap { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw {
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border-default);
    background: var(--bg-page-soft);
  }
  .sw .chip { height: 70px; }
  .sw .meta { padding: 8px 10px; }
  .sw .name { font-size: 11px; font-weight: 600; color: var(--fg-1); letter-spacing: 0.02em; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="sw"><div class="chip" style="background:#0a0a0a"></div><div class="meta"><div class="name">neutral-950</div><div class="hex">#0a0a0a · page bg</div></div></div>
      <div class="sw"><div class="chip" style="background:#171717"></div><div class="meta"><div class="name">neutral-900</div><div class="hex">#171717 · soft</div></div></div>
      <div class="sw"><div class="chip" style="background:#262626"></div><div class="meta"><div class="name">neutral-800</div><div class="hex">#262626 · elevated</div></div></div>
      <div class="sw"><div class="chip" style="background:#a3a3a3"></div><div class="meta"><div class="name">neutral-400</div><div class="hex">#a3a3a3 · fg-3</div></div></div>
      <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><div class="name">white</div><div class="hex">#ffffff · fg-1</div></div></div>
    </div>
  </div>
</body>
</html>
