<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 22px 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  label { display:block; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; color: #4A4138; margin-bottom: 8px; }
  .input, .select { width: 100%; padding: 12px 14px; background: #FFFFFF; border: 1px solid #E0D5BC; border-radius: 8px; color: #1F1A14; font-size: 14px; font-family: var(--font-sans); transition: all 200ms; box-sizing: border-box; }
  .input.focus, .input:focus { outline: none; border-color: #A87425; box-shadow: 0 0 0 3px rgba(168,116,37,0.18); }
  .textarea { min-height: 96px; resize: vertical; }
  .help { font-size: 12px; color: #8F8170; margin-top: 6px; }
  .placeholder { color: #B5A78F; }

  .pill-radio { display:flex; gap: 8px; flex-wrap: wrap; }
  .pill-radio span { padding: 8px 14px; border-radius: 9999px; border: 1px solid #E0D5BC; font-size: 13px; color: #4A4138; background: #FFFFFF; cursor: pointer; }
  .pill-radio span.active { background: #FBF3DE; border-color: #A87425; color: #7A5217; font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <label>Name</label>
      <div class="input"><span>Marta Kowalska</span></div>
    </div>
    <div>
      <label>Email</label>
      <div class="input focus"><span class="placeholder">your@email.com</span></div>
    </div>
    <div>
      <label>I'm interested in</label>
      <div class="select" style="display:flex; justify-content:space-between; align-items: center;">
        <span>Custom Jewelry (AEJaCA)</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8F8170" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
    <div>
      <label>Type</label>
      <div class="pill-radio">
        <span class="active">Ring</span>
        <span>Earrings</span>
        <span>Pendant</span>
        <span>Bracelet</span>
      </div>
    </div>
    <div style="grid-column: 1 / -1;">
      <label>Message</label>
      <div class="input textarea"><span class="placeholder">Tell us about your project or idea…</span></div>
      <div class="help">We typically reply within 24 hours · contact@aejaca.com</div>
    </div>
  </div>
</body>
</html>
