<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Jewelry palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 22px 28px; }
  .head { display:flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
  .eyebrow-rule { display: inline-flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 600; color: #7A5217; }
  .eyebrow-rule::before, .eyebrow-rule::after { content: ""; width: 24px; height: 1px; background: currentColor; opacity: 0.6; }
  .label { font-family: var(--font-serif); font-size: 18px; color: #1F1A14; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: #8F8170; }

  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .chip { aspect-ratio: 1/1.05; border-radius: 8px; position: relative; }
  .chip .n { position: absolute; bottom: 6px; left: 6px; font-size: 9px; font-family: var(--font-mono); color: rgba(0,0,0,0.55); font-weight: 600; }
  .chip.d .n { color: rgba(255,255,255,0.80); }
  .primary-row { display:flex; gap: 10px; margin-top: 14px; }
  .primary { flex:1; height: 56px; border-radius: 12px; display:flex; align-items: center; justify-content: space-between; padding: 0 16px; background: #FFFFFF; border: 1px solid #E0D5BC; }
  .primary .k { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600; color: #4A4138; }
  .primary .v { font-family: var(--font-mono); font-size: 13px; color: #1F1A14; }
  .swatch-disc { width: 26px; height: 26px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div>
        <span class="eyebrow-rule">Jewelry · champagne</span>
        <div class="label" style="margin-top: 8px;">Warm gold accent scale</div>
      </div>
      <div class="meta">--accent · --accent-hover · --accent-soft · --accent-light</div>
    </div>
    <div class="row">
      <div class="chip" style="background:#FBF3DE"><span class="n">50</span></div>
      <div class="chip" style="background:#F2DFAB"><span class="n">100</span></div>
      <div class="chip" style="background:#E6C580"><span class="n">200 · light</span></div>
      <div class="chip" style="background:#D1A458"><span class="n">300</span></div>
      <div class="chip d" style="background:#A87425"><span class="n">500 · brand</span></div>
      <div class="chip d" style="background:#7A5217"><span class="n">700 · hover</span></div>
    </div>
    <div class="primary-row">
      <div class="primary">
        <span class="k">Brand</span>
        <span style="display:inline-flex; align-items: center; gap: 10px;"><span class="swatch-disc" style="background:#A87425;"></span><span class="v">#A87425</span></span>
      </div>
      <div class="primary">
        <span class="k">Eyebrow / hover</span>
        <span style="display:inline-flex; align-items: center; gap: 10px;"><span class="swatch-disc" style="background:#7A5217;"></span><span class="v">#7A5217</span></span>
      </div>
      <div class="primary">
        <span class="k">Hero (on scrim)</span>
        <span style="display:inline-flex; align-items: center; gap: 10px;"><span class="swatch-disc" style="background:#E6C580;"></span><span class="v">#E6C580</span></span>
      </div>
    </div>
  </div>
</body>
</html>
