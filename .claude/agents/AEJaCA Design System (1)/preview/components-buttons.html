<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 22px 26px; display: grid; gap: 16px; }
  .sub-rule { display: inline-flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 600; color: #7A5217; margin-bottom: 8px; }
  .sub-rule::before, .sub-rule::after { content: ""; width: 20px; height: 1px; background: currentColor; opacity: 0.6; }
  .sub-rule.studio { color: #1D4ED8; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

  /* Primary — espresso pill */
  .btn-primary { display:inline-flex; gap: 8px; align-items: center; padding: 12px 28px; background: #1F1A14; color: #F8F4ED; border-radius: 9999px; font-size: 14px; font-weight: 500; letter-spacing: 0.04em; border: none; cursor: pointer; transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1); }
  .btn-primary:hover { background: #2D2520; box-shadow: 0 10px 24px -10px rgba(31,26,20,0.30); }
  .btn-primary.studio { background: #0F172A; color: #fff; }
  .btn-primary.studio:hover { background: #1E293B; box-shadow: 0 10px 24px -10px rgba(15,23,42,0.30); }

  /* Accent — gold or cobalt outlined pill */
  .btn-accent { display:inline-flex; gap: 8px; align-items: center; padding: 11px 24px; background: #FFFFFF; color: #7A5217; border: 1px solid #A0742B; border-radius: 9999px; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; cursor: pointer; transition: all 300ms; }
  .btn-accent:hover { background: #A87425; color: #FFFFFF; border-color: #A87425; }
  .btn-accent.studio { color: #1D4ED8; border-color: #2563EB; }
  .btn-accent.studio:hover { background: #2563EB; color: #fff; border-color: #2563EB; }

  /* Ghost link */
  .btn-link { color: #A87425; font-size: 14px; font-weight: 600; display:inline-flex; gap: 6px; align-items: center; cursor: pointer; }
  .btn-link:hover { color: #7A5217; }
  .btn-link.studio { color: #2563EB; }
  .btn-link.studio:hover { color: #1D4ED8; }
  .arrow { display: inline-block; width: 14px; height: 14px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <span class="sub-rule">Primary · espresso pill (jewelry main CTA)</span>
      <div class="row">
        <button class="btn-primary">Get in Touch <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
        <button class="btn-primary studio">Quote a project <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
      </div>
    </div>
    <div>
      <span class="sub-rule">Accent · outlined pill — fills on hover</span>
      <div class="row">
        <button class="btn-accent">Discover jewelry <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
        <button class="btn-accent studio">Enter sTuDiO <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
      </div>
    </div>
    <div>
      <span class="sub-rule">Ghost text link · arrow translates on hover</span>
      <div class="row">
        <a class="btn-link">Calculate jewelry price <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></a>
        <a class="btn-link studio">Quote a project online <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></a>
      </div>
    </div>
  </div>
</body>
</html>
