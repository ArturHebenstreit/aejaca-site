<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Photography</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 18px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .frame { aspect-ratio: 4/3; border-radius: 14px; position: relative; overflow: hidden; box-shadow: 0 1px 2px rgba(31,26,20,0.06), 0 24px 48px -12px rgba(31,26,20,0.14); }
  .frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0) 60%); }
  .caption { position: absolute; left: 14px; bottom: 12px; right: 14px; }
  .eyebrow-rule { display: inline-flex; align-items: center; gap: 8px; font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; text-shadow: 0 1px 4px rgba(0,0,0,0.40); }
  .eyebrow-rule::before, .eyebrow-rule::after { content: ""; width: 16px; height: 1px; background: currentColor; opacity: 0.7; }
  .eyebrow-rule.gold { color: #E6C580; }
  .eyebrow-rule.blue { color: #93C5FD; }
  .name { font-family: 'Playfair Display', Georgia, serif; font-size: 16px; color: #fff; font-weight: 600; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  .name.sans { font-family: Inter, sans-serif; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.85); margin-top: 4px; line-height: 1.5; text-shadow: 0 1px 6px rgba(0,0,0,0.6); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <img src="../assets/hero-home-jewelry.webp" alt="Jewelry"/>
      <div class="scrim"></div>
      <div class="caption">
        <div class="eyebrow-rule gold">Jewelry photography</div>
        <div class="name">Warm, low-key, gemstones &amp; metals in their element</div>
        <div class="meta">Slate &amp; walnut · golden rim light · 3:4 portrait</div>
      </div>
    </div>
    <div class="frame">
      <img src="../assets/hero-home-studio.webp" alt="Studio"/>
      <div class="scrim"></div>
      <div class="caption">
        <div class="eyebrow-rule blue">sTuDiO photography</div>
        <div class="name sans">Cool, atmospheric — the workshop in context</div>
        <div class="meta">Tungsten + cyan rim · machine portraits · 3:4 portrait</div>
      </div>
    </div>
  </div>
</body>
</html>
