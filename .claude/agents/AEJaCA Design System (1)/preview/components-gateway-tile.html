<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Gateway tile</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 18px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tile { position: relative; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 8px rgba(31,26,20,0.06), 0 24px 48px -12px rgba(31,26,20,0.14); }
  .tile img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .scrim { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.30) 55%, transparent 80%); }
  .footer { position: absolute; left: 0; right: 0; bottom: 0; padding: 22px 16px; text-align: center; }
  .eyebrow-rule { display: inline-flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; text-shadow: 0 1px 4px rgba(0,0,0,0.40); }
  .eyebrow-rule::before, .eyebrow-rule::after { content: ""; width: 20px; height: 1px; background: currentColor; opacity: 0.7; }
  .eyebrow-rule.gold { color: #E6C580; }
  .eyebrow-rule.blue { color: #93C5FD; }
  .name { color: #fff; font-size: 12px; line-height: 1.55; margin: 0 0 14px; text-shadow: 0 1px 8px rgba(0,0,0,0.40); }
  .pill { display:inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 9999px; font-size: 12px; font-weight: 500; backdrop-filter: blur(8px); border: 1px solid; }
  .pill.gold { color: #fff; background: rgba(168,116,37,0.40); border-color: rgba(230,197,128,0.60); }
  .pill.blue { color: #fff; background: rgba(37,99,235,0.40); border-color: rgba(147,197,253,0.60); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tile">
      <img src="../assets/hero-home-jewelry.webp" alt="AEJaCA Jewelry" />
      <div class="scrim"></div>
      <div class="footer">
        <div class="eyebrow-rule gold">AEJaCA Jewelry</div>
        <p class="name">Silver, gold, natural gemstones. Every piece handcrafted — just for you.</p>
        <span class="pill gold">Discover jewelry <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
      </div>
    </div>
    <div class="tile">
      <img src="../assets/hero-home-studio.webp" alt="AEJaCA sTuDiO" />
      <div class="scrim"></div>
      <div class="footer">
        <div class="eyebrow-rule blue">AEJaCA sTuDiO</div>
        <p class="name">3D printing, laser engraving, CNC milling. Get an instant quote online.</p>
        <span class="pill blue">Enter sTuDiO <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></span>
      </div>
    </div>
  </div>
</body>
</html>
