<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Type: Serif (Jewelry)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 26px 32px; }
  .eyebrow-rule { display: inline-flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 600; color: #7A5217; margin-bottom: 12px; }
  .eyebrow-rule::before, .eyebrow-rule::after { content: ""; width: 28px; height: 1px; background: currentColor; opacity: 0.6; }
  .display { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; font-size: 52px; line-height: 1.04; letter-spacing: -0.02em; color: #1F1A14; margin: 0; }
  .meta-row { display: flex; gap: 24px; margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: #8F8170; }
  .meta-row b { color: #4A4138; font-weight: 600; }
  .stack { margin-top: 22px; display: grid; gap: 6px; }
  .stack .line { font-family: 'Playfair Display', Georgia, serif; color: #1F1A14; line-height: 1.18; }
  .accent { color: #A87425; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow-rule">Playfair Display · Serif</div>
    <h1 class="display">Wear what matters.</h1>
    <div class="meta-row">
      <span><b>Family</b> Playfair Display</span>
      <span><b>Weights</b> 400 · 500 · 600 · 700 · 400 italic</span>
      <span><b>Used by</b> Jewelry · Hero · H1 · H2 · H3</span>
    </div>
    <div class="stack">
      <div class="line" style="font-size: 34px; font-weight: 600; letter-spacing: -0.01em;">Where art meets craftsmanship</div>
      <div class="line" style="font-size: 22px; font-weight: 600;">How your jewelry is made</div>
      <div class="line accent" style="font-size: 18px; font-style: italic; font-weight: 400;">A timeless companion.</div>
    </div>
  </div>
</body>
</html>
