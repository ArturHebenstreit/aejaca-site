<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Navbar</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F3EDDF; font-family: var(--font-sans); color: #1F1A14; }
  .scene { padding: 28px; }
  .nav { display:flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; background: rgba(248,244,237,0.92); backdrop-filter: blur(20px); border: 1px solid #E0D5BC; border-radius: 10px; box-shadow: 0 4px 8px rgba(31,26,20,0.06), 0 24px 48px -12px rgba(31,26,20,0.10); }
  .brand { display:flex; align-items: center; gap: 12px; }
  .brand img { width: 32px; height: 32px; filter: brightness(0); opacity: 0.85; }
  .brand span { font-family: 'Playfair Display', Georgia, serif; font-size: 19px; font-weight: 600; letter-spacing: 0.02em; color: #1F1A14; }
  .links { display:flex; align-items: center; gap: 28px; }
  .link { font-size: 13px; color: #4A4138; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  .link.active { color: #A87425; font-weight: 600; position: relative; }
  .link.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -18px; height: 2px; background: #A87425; border-radius: 999px; }
  .caret { width: 11px; height: 11px; opacity: 0.7; }
  .lang { font-size: 12px; color: #4A4138; display:inline-flex; gap: 6px; align-items: center; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
  .lang:hover { background: rgba(168,116,37,0.10); }
</style>
</head>
<body>
  <div class="scene">
    <div class="nav">
      <div class="brand">
        <img src="../assets/brand-sign.webp" alt="AEJaCA" />
        <span>AEJaCA</span>
      </div>
      <div class="links">
        <span class="link">Home</span>
        <span class="link active">AEJaCA Jewelry <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
        <span class="link">AEJaCA sTuDiO <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
        <span class="link">Gallery <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
        <span class="link">About AEJaCA <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
        <span class="link">Contact</span>
        <span class="lang"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>🇬🇧 EN</span>
      </div>
    </div>
  </div>
</body>
</html>
