<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Brand mark treatments</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F8F4ED; font-family: var(--font-sans); color: #1F1A14; }
  .wrap { padding: 22px 26px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .panel { aspect-ratio: 1/1; border-radius: 14px; display:flex; align-items: center; justify-content: center; position: relative; border: 1px solid; }
  .panel .meta { position: absolute; bottom: 10px; left: 12px; font-family: var(--font-mono); font-size: 10px; }
  .panel img { width: 56%; }

  .light { background: #F8F4ED; border-color: #E0D5BC; }
  .light img { filter: brightness(0); opacity: 0.88; }
  .light .meta { color: #8F8170; }

  .gold { background: #FBF3DE; border-color: #E0D5BC; }
  .gold img { filter: brightness(0) saturate(100%) invert(48%) sepia(89%) saturate(442%) hue-rotate(13deg) brightness(91%) contrast(89%); }
  .gold .meta { color: #8F8170; }

  .espresso { background: #1F1A14; border-color: #2D2520; }
  .espresso img { filter: brightness(0) invert(1); opacity: 0.92; }
  .espresso .meta { color: #B5A78F; }

  .dark { background: #0a0a0a; border-color: rgba(255,255,255,0.10); }
  .dark img { filter: brightness(0) invert(1) drop-shadow(0 0 20px rgba(245,158,11,0.30)); opacity: 0.92; }
  .dark .meta { color: #737373; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel light"><img src="../assets/brand-sign.webp" alt="AEJaCA black"/><span class="meta">on cream · primary</span></div>
    <div class="panel gold"><img src="../assets/brand-sign.webp" alt="AEJaCA gold"/><span class="meta">champagne tint</span></div>
    <div class="panel espresso"><img src="../assets/brand-sign.webp" alt="AEJaCA inverse"/><span class="meta">on espresso panel</span></div>
    <div class="panel dark"><img src="../assets/brand-sign.webp" alt="AEJaCA night"/><span class="meta">night mode</span></div>
  </div>
</body>
</html>
