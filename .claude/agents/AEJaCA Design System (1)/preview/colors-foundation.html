<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Colors: Foundation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f7f5f0; font-family: var(--font-sans); }
  .wrap { padding: 22px 26px; display: grid; gap: 18px; }
  .pair { display: grid; gap: 8px; }
  .label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #6B5F4F; font-weight: 600; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,0.08); }
  .sw .chip { height: 56px; }
  .sw .meta { padding: 8px 10px; background: #fff; }
  .sw .name { font-size: 11px; font-weight: 600; color: #1F1A14; letter-spacing: 0.02em; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; color: #8F8170; margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="pair">
      <div class="label">Jewelry — warm neutrals</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:#F8F4ED"></div><div class="meta"><div class="name">bg-page</div><div class="hex">#F8F4ED · cream</div></div></div>
        <div class="sw"><div class="chip" style="background:#F3EDDF"></div><div class="meta"><div class="name">bg-soft</div><div class="hex">#F3EDDF</div></div></div>
        <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">bg-elevated</div><div class="hex">#FFFFFF · card</div></div></div>
        <div class="sw"><div class="chip" style="background:#E0D5BC"></div><div class="meta"><div class="name">border</div><div class="hex">#E0D5BC</div></div></div>
        <div class="sw"><div class="chip" style="background:#1F1A14"></div><div class="meta"><div class="name">fg-1</div><div class="hex">#1F1A14 · espresso</div></div></div>
      </div>
    </div>
    <div class="pair">
      <div class="label">sTuDiO — cool neutrals</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:#F4F6F9"></div><div class="meta"><div class="name">bg-page</div><div class="hex">#F4F6F9 · blueprint</div></div></div>
        <div class="sw"><div class="chip" style="background:#EAEFF6"></div><div class="meta"><div class="name">bg-soft</div><div class="hex">#EAEFF6</div></div></div>
        <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><div class="name">bg-elevated</div><div class="hex">#FFFFFF · card</div></div></div>
        <div class="sw"><div class="chip" style="background:#D9DFE8"></div><div class="meta"><div class="name">border</div><div class="hex">#D9DFE8</div></div></div>
        <div class="sw"><div class="chip" style="background:#0F172A"></div><div class="meta"><div class="name">fg-1</div><div class="hex">#0F172A · slate</div></div></div>
      </div>
    </div>
  </div>
</body>
</html>
