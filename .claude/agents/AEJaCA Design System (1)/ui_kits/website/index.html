<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEJaCA — Website UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="../../assets/favicon-32x32.png" />
<link rel="stylesheet" href="./tokens.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    color: var(--fg-1);
    font-family: var(--font-ui);
    transition: background var(--dur-base) var(--ease-editorial), color var(--dur-base) var(--ease-editorial);
  }
  *, *::before, *::after { box-sizing: border-box; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  html { scroll-behavior: smooth; }
  ::selection { background: var(--accent-soft); color: var(--fg-1); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-page); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body class="brand-jewelry">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./Icon.jsx"></script>
<script type="text/babel" src="./Atoms.jsx"></script>
<script type="text/babel" src="./Navbar.jsx"></script>
<script type="text/babel" src="./HomeCards.jsx"></script>
<script type="text/babel" src="./HomePage.jsx"></script>
<script type="text/babel" src="./SubPages.jsx"></script>
<script type="text/babel" src="./Footer.jsx"></script>

<script type="text/babel">
function App() {
  const [lang, setLang] = React.useState("en");
  const [activePage, _setActivePage] = React.useState("home");
  const [darkMode, setDarkMode] = React.useState(false);

  // Toggle data-theme on <html> so all .brand-jewelry / .brand-studio
  // scopes get the dark palette via the CSS override.
  React.useEffect(() => {
    if (darkMode) document.documentElement.setAttribute("data-theme", "dark");
    else document.documentElement.removeAttribute("data-theme");
  }, [darkMode]);

  const setActivePage = (id) => {
    _setActivePage(id);
    requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: "smooth" }));
  };

  return (
    <div data-screen-label="AEJaCA Website">
      <Navbar
        lang={lang} setLang={setLang}
        activePage={activePage} setActivePage={setActivePage}
        darkMode={darkMode} setDarkMode={setDarkMode}
      />
      <main>
        {activePage === "home" && <HomePage lang={lang} setActivePage={setActivePage} />}
        {activePage === "jewelry" && <JewelryPage lang={lang} />}
        {activePage === "studio" && <StudioPage lang={lang} />}
        {activePage === "about" && <AboutPage />}
        {activePage === "contact" && <ContactPage />}
      </main>
      <Footer lang={lang} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
