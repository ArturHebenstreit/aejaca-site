    <!-- Favicon -->

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for external links (Etsy, social) — faster navigation -->
    <link rel="dns-prefetch" href="https://aejacashop.etsy.com" />
    <link rel="dns-prefetch" href="https://aejaca2studio.etsy.com" />
    <link rel="dns-prefetch" href="https://www.instagram.com" />
    <link rel="dns-prefetch" href="https://www.facebook.com" />
    <link rel="dns-prefetch" href="https://www.tiktok.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
    />

    <!-- Preload critical images (WebP preferred) -->
    <link rel="preload" as="image" href="/hero-jewelry.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/hero-studio.webp" type="image/webp" fetchpriority="high" />

    <!-- Helmet (react-helmet-async) injects per-page: title, description,
         keywords, robots, canonical, hreflang, OG, Twitter, JSON-LD.
         Only static tags that never change live here. -->
    <meta name="author" content="AEJaCA" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- JSON-LD schemas are injected per-page by SEOHead via react-helmet-async -->
  </head>

  <body class="bg-neutral-950 text-white">
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
