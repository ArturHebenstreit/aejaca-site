name = "aejaca-analytics"
main = "worker.js"
compatibility_date = "2024-12-01"

# After creating D1, paste the database_id below:
# wrangler d1 create aejaca-analytics
[[d1_databases]]
binding = "DB"
database_name = "aejaca-analytics"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

[vars]
# Dashboard access token — change this to something secret!
DASHBOARD_TOKEN = "CHANGE_ME_TO_A_RANDOM_SECRET"
# Allowed origin for CORS
ALLOWED_ORIGIN = "https://www.aejaca.com"

# Optional: scheduled aggregation (daily at 3am UTC)
# [triggers]
# crons = ["0 3 * * *"]
